apiVersion: v1
kind: Secret
metadata:
  name: nowait-secrets
type: Opaque
data:
  # IMPORTANT: Base64 encode your actual values using `echo -n "value" | base64`
  DB_USER: <base64_db_username>
  DB_PASS: <base64_db_password>
  JWT_PRIVATE_KEY: |
    <base64_jwt_private_key>
  RAZORPAY_KEY_ID: <base64_razorpay_key_id>
  RAZORPAY_KEY_SECRET: <base64_razorpay_key_secret>
