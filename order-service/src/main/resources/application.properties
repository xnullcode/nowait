spring.application.name=order-service

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5434/order_db}
spring.datasource.username=${DB_USER:nowait_user}
spring.datasource.password=${DB_PASSWORD:nowait_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (Asymmetric Key)
jwt.public-key=-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----
jwt.expiration=86400000

# Server port
server.port=${PORT:8083}
